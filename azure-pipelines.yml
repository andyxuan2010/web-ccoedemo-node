name: $(Build.Repository.Name)

trigger:
  branches:
    include:
      - main
      #- none

pr:
  branches:
    include:
      - main

resources:
  repositories:
    - repository: tf_tpl
      type: git
      name: IaC/template
      ref: refs/heads/main

pool:
  name: "IaCRunner"
  demands:
    - Agent.OS -equals Linux

variables:
  - name: env
    ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
      value: "prod"
    ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
      value: "dev"
    ${{ if eq(variables['Build.SourceBranchName'], 'sbx') }}:
      value: "sbx"
  - name: subscription
    ${{ if eq(variables['Build.SourceBranchName'], 'main') }}:
      value: "prod"
    ${{ if eq(variables['Build.SourceBranchName'], 'dev') }}:
      value: "nonprod"
    ${{ if eq(variables['Build.SourceBranchName'], 'sbx') }}:
      value: "sbx"
  - name: azureServiceConnection
    value: "sc-ccoe-iac-devops-${{ variables.subscription }}"
  - name: webAppNamePrimary
    value: "web-platform-eus-dev-node"
  - name: webAppNameSecondary
    value: ""
  - name: webAppNameThird
    value: ""
  - name: packagePath
    value: "$(Build.ArtifactStagingDirectory)/app.zip"
  - name: packageRoot
    value: "$(Build.ArtifactStagingDirectory)/package"
  - name: nodeVersion
    value: "24.x"
  - name: windowsNodeVersion
    value: "~24"
  - name: linuxNodeRuntimeStack
    value: "NODE|24-lts"

stages:
  - stage: Build
    displayName: Build
    jobs:
      - job: Build
        displayName: Build package
        steps:
          - template: templates/shared-runner-hygiene.yml@tf_tpl
            parameters:
              configureNodeCache: true
              runPostJobCleanup: false

          - checkout: self
            clean: true
            persistCredentials: false

          - task: UseNode@1
            displayName: Use Node 24
            inputs:
              version: "$(nodeVersion)"

          - script: |
              set -euo pipefail
              npm ci
            displayName: Install dependencies

          - script: |
              set -euo pipefail
              node --check app.js
            displayName: Validate app syntax

          - script: |
              set -euo pipefail

              PACKAGE_ROOT="$(packageRoot)"

              rm -rf "${PACKAGE_ROOT}"
              mkdir -p "${PACKAGE_ROOT}"

              cp app.js "${PACKAGE_ROOT}/"
              cp package.json "${PACKAGE_ROOT}/"
              cp package-lock.json "${PACKAGE_ROOT}/"
              cp web.config "${PACKAGE_ROOT}/"
              cp -R views "${PACKAGE_ROOT}/views"
              cp -R static "${PACKAGE_ROOT}/static"
            displayName: Stage application files

          - task: ArchiveFiles@2
            displayName: Archive application
            inputs:
              rootFolderOrFile: "$(packageRoot)"
              includeRootFolder: false
              archiveType: zip
              archiveFile: "$(packagePath)"
              replaceExistingArchive: true

          - publish: "$(packagePath)"
            displayName: Publish artifact
            artifact: drop

          - template: templates/shared-runner-hygiene.yml@tf_tpl
            parameters:
              runInitialization: false
              runPreJobCleanup: false
              runCachePrep: false


  - stage: CreateGitTag
    displayName: Create Git Tag
    dependsOn: Build
    condition: and(succeeded('Build'), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: create_git_tag
        displayName: Create Git Tag
        steps:
          - checkout: self
            clean: true
            persistCredentials: true
            fetchDepth: 0

          - bash: |
              set -euo pipefail

              source_branch="$(Build.SourceBranchName)"
              source_sha="$(Build.SourceVersion)"

              git fetch --force --tags

              latest_tag="$(git tag --list 'v[1-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
              if [[ -z "${latest_tag}" ]]; then
                latest_tag="v1.0.0"
                previous_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
                if [[ -n "${previous_tag}" ]]; then
                  commit_range="${previous_tag}..${source_sha}"
                else
                  commit_range="${source_sha}"
                fi
              else
                commit_range="${latest_tag}..${source_sha}"
              fi

              commits="$(git log --format=%B ${commit_range})"
              release_notes="$(git log --format='- %s (%h)' ${commit_range} | head -n 20)"
              if [[ -z "${release_notes}" ]]; then
                release_notes="- ${source_sha}"
              fi

              if grep -Eq '(^|[[:space:]])BREAKING[ -]CHANGE:|^[a-zA-Z][a-zA-Z0-9-]*(\([^)]+\))?!:' <<< "${commits}"; then
                bump="major"
              elif grep -Eq '^feat(\([^)]+\))?:' <<< "${commits}"; then
                bump="minor"
              elif grep -Eq '^fix(\([^)]+\))?:' <<< "${commits}"; then
                bump="patch"
              else
                echo "No semantic-release prefix found; defaulting to patch bump."
                bump="patch"
              fi

              version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "${version}"

              case "${bump}" in
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                patch)
                  patch=$((patch + 1))
                  ;;
              esac

              tag_name="v${major}.${minor}.${patch}"

              if git rev-parse -q --verify "refs/tags/${tag_name}" >/dev/null; then
                echo "Tag ${tag_name} already exists; leaving it unchanged."
                exit 0
              fi

              if git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
                echo "Remote already has tag ${tag_name}; leaving it unchanged."
                exit 0
              fi

              git config user.name "Azure Pipelines"
              git config user.email "azure-pipelines@local"

              tag_message="$(mktemp)"
              {
                echo "Release ${tag_name} (${bump})"
                echo
                echo "Source: ${source_branch}@${source_sha}"
                echo "Range: ${commit_range}"
                echo
                echo "Changes:"
                printf '%s\n' "${release_notes}"
              } > "${tag_message}"

              git tag -a "${tag_name}" "${source_sha}" -F "${tag_message}"
              git push origin "refs/tags/${tag_name}"
            displayName: Create annotated semantic version tag

  - stage: Deploy
    displayName: Deploy
    dependsOn: Build
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: Deploy
        displayName: Deploy to Azure App Service
        steps:
          - template: templates/shared-runner-hygiene.yml@tf_tpl
            parameters:
              runPostJobCleanup: false

          - task: AzureCLI@2
            displayName: Check primary deployment target
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $appName = '$(webAppNamePrimary)'.Trim()
                if ([string]::IsNullOrWhiteSpace($appName)) {
                  Write-Host "##vso[task.logissue type=warning]webAppNamePrimary is not defined. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipPrimaryDeployment]true"
                  exit 0
                }

                $appId = az resource list --name $appName --resource-type "Microsoft.Web/sites" --query "[0].id" --output tsv
                if ([string]::IsNullOrWhiteSpace($appId)) {
                  Write-Host "##vso[task.logissue type=warning]App Service '$appName' was not found. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipPrimaryDeployment]true"
                  exit 0
                }

                Write-Host "App Service '$appName' found."
                Write-Host "##vso[task.setvariable variable=skipPrimaryDeployment]false"
                $subscriptionId = ($appId -split '/')[2]
                $resourceGroup = ($appId -split '/')[4]
                Write-Host "##vso[task.setvariable variable=primarySubscriptionId]$subscriptionId"
                Write-Host "##vso[task.setvariable variable=primaryResourceGroup]$resourceGroup"

          - task: AzureCLI@2
            displayName: Check secondary deployment target
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $appName = '$(webAppNameSecondary)'.Trim()
                if ([string]::IsNullOrWhiteSpace($appName)) {
                  Write-Host "##vso[task.logissue type=warning]webAppNameSecondary is not defined. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipSecondaryDeployment]true"
                  exit 0
                }

                $appId = az resource list --name $appName --resource-type "Microsoft.Web/sites" --query "[0].id" --output tsv
                if ([string]::IsNullOrWhiteSpace($appId)) {
                  Write-Host "##vso[task.logissue type=warning]App Service '$appName' was not found. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipSecondaryDeployment]true"
                  exit 0
                }

                Write-Host "App Service '$appName' found."
                Write-Host "##vso[task.setvariable variable=skipSecondaryDeployment]false"
                $subscriptionId = ($appId -split '/')[2]
                $resourceGroup = ($appId -split '/')[4]
                Write-Host "##vso[task.setvariable variable=secondarySubscriptionId]$subscriptionId"
                Write-Host "##vso[task.setvariable variable=secondaryResourceGroup]$resourceGroup"

          - task: AzureCLI@2
            displayName: Check third deployment target
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $appName = '$(webAppNameThird)'.Trim()
                if ([string]::IsNullOrWhiteSpace($appName)) {
                  Write-Host "##vso[task.logissue type=warning]webAppNameThird is not defined. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipThirdDeployment]true"
                  exit 0
                }

                $appId = az resource list --name $appName --resource-type "Microsoft.Web/sites" --query "[0].id" --output tsv
                if ([string]::IsNullOrWhiteSpace($appId)) {
                  Write-Host "##vso[task.logissue type=warning]App Service '$appName' was not found. Skipping deployment."
                  Write-Host "##vso[task.setvariable variable=skipThirdDeployment]true"
                  exit 0
                }

                Write-Host "App Service '$appName' found."
                Write-Host "##vso[task.setvariable variable=skipThirdDeployment]false"
                $subscriptionId = ($appId -split '/')[2]
                $resourceGroup = ($appId -split '/')[4]
                Write-Host "##vso[task.setvariable variable=thirdSubscriptionId]$subscriptionId"
                Write-Host "##vso[task.setvariable variable=thirdResourceGroup]$resourceGroup"

          - download: current
            displayName: Download artifact
            artifact: drop
            condition: or(ne(variables['skipPrimaryDeployment'], 'true'), ne(variables['skipSecondaryDeployment'], 'true'), ne(variables['skipThirdDeployment'], 'true'))

          - task: AzureCLI@2
            displayName: Deploy web apps with ZIP deploy and build automation
            condition: or(ne(variables['skipPrimaryDeployment'], 'true'), ne(variables['skipSecondaryDeployment'], 'true'), ne(variables['skipThirdDeployment'], 'true'))
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                packagePath="$(Pipeline.Workspace)/drop/app.zip"

                test_scm_connectivity() {
                  local host_name="$1"

                  echo "Starting SCM connectivity preflight for ${host_name}..."

                  if getent ahosts "${host_name}" > /tmp/scm_dns.txt 2>/tmp/scm_dns_err.txt; then
                    awk '!seen[$1 FS $2]++ { printf("SCM resolved address [%s]: %s\n", $2, $1) }' /tmp/scm_dns.txt
                  else
                    cat /tmp/scm_dns_err.txt || true
                    if command -v nslookup >/dev/null 2>&1; then
                      nslookup "${host_name}" || true
                    fi
                    echo "Failed to resolve ${host_name} from the build agent." >&2
                    exit 1
                  fi

                  echo "SCM TCP probe: testing ${host_name}:443"
                  if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${host_name}/443" 2>/tmp/scm_tcp_err.txt; then
                    cat /tmp/scm_tcp_err.txt || true
                    echo "Failed to reach https://${host_name} from the build agent." >&2
                    exit 1
                  fi
                }

                deploy_target() {
                  local app_name="$1"
                  local resource_group="$2"
                  local subscription_id="$3"

                  if [ -z "${app_name}" ]; then
                    echo "Deployment target is blank. Skipping."
                    return 0
                  fi

                  if [ -z "${subscription_id}" ] || [ -z "${resource_group}" ]; then
                    echo "Deployment metadata is incomplete for '${app_name}'. subscriptionId='${subscription_id}' resourceGroup='${resource_group}'" >&2
                    exit 1
                  fi

                  local scm_host="${app_name}.scm.azurewebsites.net"
                  local app_os

                  echo "Deploying ZIP package with build automation to ${app_name}..."
                  az account set --subscription "${subscription_id}"
                  test_scm_connectivity "${scm_host}"

                  app_os="$(az webapp show --resource-group "${resource_group}" --name "${app_name}" --query reserved --output tsv | tr '[:upper:]' '[:lower:]')"
                  echo "Detected reserved value for ${app_name}: ${app_os}"

                  if [ "${app_os}" = "true" ]; then
                    az webapp config set \
                      --resource-group "${resource_group}" \
                      --name "${app_name}" \
                      --linux-fx-version "$(linuxNodeRuntimeStack)" \
                      --startup-file "npm start"

                    az webapp config appsettings delete \
                      --resource-group "${resource_group}" \
                      --name "${app_name}" \
                      --setting-names WEBSITE_NODE_DEFAULT_VERSION WEBSITE_RUN_FROM_PACKAGE || true
                  elif [ "${app_os}" = "false" ]; then
                    az webapp config appsettings delete \
                      --resource-group "${resource_group}" \
                      --name "${app_name}" \
                      --setting-names WEBSITE_RUN_FROM_PACKAGE || true

                    az webapp config appsettings set \
                      --resource-group "${resource_group}" \
                      --name "${app_name}" \
                      --settings WEBSITE_NODE_DEFAULT_VERSION="$(windowsNodeVersion)"
                  else
                    echo "Unexpected reserved value '${app_os}' for '${app_name}'. Continuing with neutral ZIP deployment." >&2
                  fi

                  az webapp config appsettings set \
                    --resource-group "${resource_group}" \
                    --name "${app_name}" \
                    --settings \
                      SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                      ENABLE_ORYX_BUILD=true \
                      APP_SERVICE_NAME="${app_name}" \
                      APP_SERVICE_SUBSCRIPTION_ID="${subscription_id}" \
                      APP_SERVICE_RESOURCE_GROUP="${resource_group}"

                  az webapp deploy \
                    --resource-group "${resource_group}" \
                    --name "${app_name}" \
                    --src-path "${packagePath}" \
                    --type zip \
                    --restart true \
                    --track-status false
                }

                if [ "$(skipPrimaryDeployment)" != "true" ]; then
                  deploy_target "$(webAppNamePrimary)" "$(primaryResourceGroup)" "$(primarySubscriptionId)"
                fi

                if [ "$(skipSecondaryDeployment)" != "true" ]; then
                  deploy_target "$(webAppNameSecondary)" "$(secondaryResourceGroup)" "$(secondarySubscriptionId)"
                fi

                if [ "$(skipThirdDeployment)" != "true" ]; then
                  deploy_target "$(webAppNameThird)" "$(thirdResourceGroup)" "$(thirdSubscriptionId)"
                fi

          - template: templates/shared-runner-hygiene.yml@tf_tpl
            parameters:
              runInitialization: false
              runPreJobCleanup: false
              runCachePrep: false
